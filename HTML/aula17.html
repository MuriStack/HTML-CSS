<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>
            Curso Completo de HTML - CFB Cursos - Aula17
        </title>

        <style>
            canvas{
                border: 1px #000 solid;
            }
        </style>
        <!--Isso é JavaScript (JS)-->
        <script>
            function desenha(){
                var canvas = document.getElementById('teladesenho');
                var ctx = canvas.getContext('2d');
                ctx.fillRect(25, 25, 100, 100)
            }
        </script>
    </head>
    <body>
        <canvas id="teladesenho" width="500px" height="500px">Seu browser não tem suporte ao elemento canvas!</canvas>
        <script>
            desenha();
        </script>
    </body>
</html>
